<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領収書計算</title>

<style>
body{
    background:#e5e5e5;
    font-family:sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
    color:#ff7a00;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:32px;
    text-align:center;
    border:none;
    border-radius:12px;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:12px;
}

.calc-btn{
    background:#ff7a00;
    color:white;
}

.clear-btn{
    background:#18a558;
    color:white;
}

.result{
    margin-top:20px;
    background:white;
    border-radius:12px;
    padding:20px;
}

.item{
    margin:25px 0;
}

.label{
    font-size:18px;
    color:#666;
}

.value{
    font-size:36px;
    font-weight:bold;
}

.total{
    color:#ff7a00;
}

.tax{
    color:#18a558;
}

.detail{
    font-size:14px;
    color:#888;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>領収書計算</h1>

<input
    id="price"
    type="number"
    placeholder="税込金額を入力"
    onclick="this.select()"
    onfocus="this.select()">

<div class="button-group">

    <button
        class="calc-btn"
        onclick="calc()">
        計算
    </button>

    <button
        class="clear-btn"
        onclick="clearForm()">
        クリア
    </button>

</div>

<div class="result">

    <div class="item">
        <div class="label">税込金額</div>
        <div class="value total" id="included">-</div>
    </div>

    <div class="item">
        <div class="label">税抜金額</div>
        <div class="value" id="excluded">-</div>
        <div class="detail" id="excludedRaw"></div>
    </div>

    <div class="item">
        <div class="label">消費税（10%）</div>
        <div class="value tax" id="tax">-</div>
        <div class="detail" id="taxRaw"></div>
    </div>

</div>

</div>

<script>

function yen(num){
    return num.toLocaleString() + "円";
}

function calc(){

    const included =
        Number(document.getElementById("price").value);

    if(!included){
        return;
    }

    const excludedRaw = included / 1.1;
    const taxRaw = included - excludedRaw;

    const excluded = Math.round(excludedRaw);
    const tax = Math.round(taxRaw);

    document.getElementById("included").textContent =
        yen(included);

    document.getElementById("excluded").textContent =
        yen(excluded);

    document.getElementById("tax").textContent =
        yen(tax);

    const hasDecimal =
        Math.abs(excludedRaw - Math.round(excludedRaw)) > 0.001 ||
        Math.abs(taxRaw - Math.round(taxRaw)) > 0.001;

    if(hasDecimal){

        document.getElementById("excludedRaw").textContent =
            "計算値: " + excludedRaw.toFixed(2) + "円";

        document.getElementById("taxRaw").textContent =
            "計算値: " + taxRaw.toFixed(2) + "円";

    }else{

        document.getElementById("excludedRaw").textContent = "";
        document.getElementById("taxRaw").textContent = "";
    }

    document.activeElement.blur();
}

function clearForm(){

    document.getElementById("price").value = "";

    document.getElementById("included").textContent = "-";
    document.getElementById("excluded").textContent = "-";
    document.getElementById("tax").textContent = "-";

    document.getElementById("excludedRaw").textContent = "";
    document.getElementById("taxRaw").textContent = "";

    document.getElementById("price").focus();
}

</script>

</body>
</html>

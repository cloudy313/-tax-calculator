<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インボイス計算</title>

<style>
body{
    background:#f3f1ed;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
    color:#5a2d0c;
    font-weight:700;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:18px;
    font-size:32px;
    text-align:center;
    border:none;
    border-radius:12px;
    background:white;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:12px;
}

.calc-btn{
    background:#5a2d0c;
    color:white;
}

.clear-btn{
    background:#5f6368;
    color:white;
}

.result{
    margin-top:20px;
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.item{
    margin:25px 0;
}

.label{
    font-size:18px;
    color:#666;
}

.value{
    font-size:36px;
    font-weight:bold;
}

.total{
    color:#5a2d0c;
}

.tax{
    color:#444;
}
</style>
</head>

<body>

<div class="container">

<h1>インボイス計算</h1>

<input
    id="price"
    type="number"
    placeholder="税込金額を入力"
    onclick="this.select()"
    onfocus="this.select()">

<div class="button-group">

    <button class="calc-btn" onclick="calc()">
        計算
    </button>

    <button class="clear-btn" onclick="clearForm()">
        クリア
    </button>

</div>

<div class="result">

    <div class="item">
        <div class="label">税込金額</div>
        <div class="value total" id="included">-</div>
    </div>

    <div class="item">
        <div class="label">税抜金額</div>
        <div class="value" id="excluded">-</div>
    </div>

    <div class="item">
        <div class="label">消費税（10%）</div>
        <div class="value tax" id="tax">-</div>
    </div>

    <div class="item" id="rawTaxWrap" style="display:none;">
        <div class="label">計算税額（参考）</div>
        <div class="value tax" id="rawTax">-</div>
    </div>

</div>

</div>

<script>

function yen(num){
    return num.toLocaleString() + "円";
}

function calc(){

    const included =
        Number(document.getElementById("price").value);

    if(!included){
        return;
    }

    const rawExcluded =
        included / 1.1;

    const excluded =
        Math.round(rawExcluded);

    const tax =
        Math.round(included - rawExcluded);

    const hasRemainder =
        Math.abs(rawExcluded - excluded) > 0.0001;

    document.getElementById("included").textContent =
        yen(included);

    document.getElementById("excluded").textContent =
        yen(excluded);

    document.getElementById("tax").textContent =
        yen(tax);

    if(hasRemainder){
        document.getElementById("rawTaxWrap").style.display = "block";
        document.getElementById("rawTax").textContent =
            (included - rawExcluded).toFixed(2) + "円";
    } else {
        document.getElementById("rawTaxWrap").style.display = "none";
    }

    document.activeElement.blur();
}

function clearForm(){

    document.getElementById("price").value = "";

    document.getElementById("included").textContent = "-";
    document.getElementById("excluded").textContent = "-";
    document.getElementById("tax").textContent = "-";

    document.getElementById("rawTaxWrap").style.display = "none";
    document.getElementById("price").focus();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インボイス計算</title>

  <style>
    body {
      margin: 0;
      background: #e9e9e9;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .receipt {
      width: 320px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      border-radius: 8px;
    }

    .title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .line {
      border-top: 1px dashed #999;
      margin: 10px 0;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-align: right;
      font-family: inherit;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 15px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .total {
      font-size: 18px;
      font-weight: bold;
    }

    .small {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="receipt">
    <div class="title">インボイス計算</div>

    <input type="number" id="price" placeholder="¥ 金額を入力">

    <button onclick="calcTax()">計算</button>

    <div class="line"></div>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calcTax() {
      const price = Number(document.getElementById("price").value);
      const taxRate = 0.1;

      if (!price) {
        document.getElementById("result").innerHTML = "金額を入力してください";
        return;
      }

      const rawTax = price * taxRate;
      const tax = Math.floor(rawTax);
      const total = price + tax;
      const hasRemainder = rawTax !== tax;

      let text = "";

      text += `税抜金額　　¥${price.toLocaleString()}\n`;
      text += `消費税　　　¥${tax.toLocaleString()}\n`;
      text += `税込金額　　¥${total.toLocaleString()}\n`;

      if (hasRemainder) {
        text += `\n--- 明細 ---\n`;
        text += `計算税額　　¥${rawTax.toFixed(2)}\n`;
        text += `端数　　　　${(rawTax - tax).toFixed(2)}`;
      }

      document.getElementById("result").innerText = text;
    }
  </script>

</body>
</html>
